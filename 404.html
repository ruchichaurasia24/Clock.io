<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            place-items: center;
        }

        html,
        body {
            display: grid;
            height: 100%;
            place-items: center;
            background-color: black;
        }

        .wrapper {
            height: 100px;
            width: 380px;
            border-radius: 10px;
            border: 2px solid black;
            background-color: rgb(207, 94, 94);
            background: linear-gradient(135deg , #14ffe9 , #ffeb3b , #ff00e0);
            animation : animate 1.5s linear infinite;
        }

        .wrapper .display ,
        .wrapper span{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

        }

        .wrapper .display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgb(14, 14, 15);
            height: 80px;
            width: 345px;
            text-align: center;
            border-radius: 6px;
            text-align: center;
        }
        .wrapper .display #time{
            line-height: 85px;
            color : #fff;
            font-size: 50px;
            background: linear-gradient(135deg , #14ffe9 , #ffeb3b , #ff00e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation : animate 3.5s linear infinite;
        }
        @keyframes animate {
            100%{
                filter : hue-rotate(360deg);
            }
        }
        .wrapper span{
            height: 100%;
            width : 100%;
            background: inherit;
            border-radius: 10px;
        }
        .wrapper span :first-child{
            filter : blur(10px);
        }

        .wrapper span :last-child{
            filter : blur(20px);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="display">
            <div id="time">12:00:00 pm</div>
        </div>
    </div>
    <span></span>
    <script>
        setInterval(() => {
        const time = document.querySelector("#time");
        let date = new Date();
        let hours = date.getHours();
        let minutes = date.getMinutes();
        let seconds = date.getSeconds();
        let day_night = "AM";
        if (hours >= 12){
            day_night = "PM";
            hours -= 12;
        }
        if (minutes < 10){
            minutes = "0" + minutes;
        }
        if (seconds < 10){
            seconds = "0" + seconds;
        }
        if (hours < 10){
            hours = "0" + hours;
        }
        time.textContent = hours + ":" + minutes + ":" + seconds + " " + day_night;
        });
    </script>
</body>

</html>
